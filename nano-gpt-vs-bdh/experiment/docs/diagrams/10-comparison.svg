<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A6472"/>
    </marker>
  </defs>

  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A1D23">GPT vs BDH: a fair fight</text>
  <text x="600" y="65" text-anchor="middle" font-size="13" fill="#5A6472">identical data, tokenizer, and training recipe - only the model internals change, then both hit one scoreboard</text>

  <!-- shared setup -->
  <rect x="300" y="88" width="600" height="152" rx="12" fill="#F5F7F9" stroke="#5A6472" stroke-width="1.8"/>
  <text x="600" y="114" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#1A1D23">Shared setup (held fixed)</text>
  <rect x="325" y="126" width="550" height="30" rx="8" fill="#FFFFFF" stroke="#9AA3AD" stroke-width="1.2"/>
  <text x="600" y="146" text-anchor="middle" font-size="11.5" fill="#1A1D23">TinyShakespeare data (data/prepare.py: train.pt / val.pt)</text>
  <rect x="325" y="162" width="550" height="30" rx="8" fill="#FFFFFF" stroke="#9AA3AD" stroke-width="1.2"/>
  <text x="600" y="182" text-anchor="middle" font-size="11.5" fill="#1A1D23">Char tokenizer, V is about 65 (tokenizer.py)</text>
  <rect x="325" y="198" width="550" height="30" rx="8" fill="#FFFFFF" stroke="#9AA3AD" stroke-width="1.2"/>
  <text x="600" y="218" text-anchor="middle" font-size="11.5" fill="#1A1D23">Same train recipe, matched params (train.py)</text>

  <!-- fan-out arrows -->
  <path d="M550,240 C500,270 400,270 350,296" fill="none" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M650,240 C700,270 800,270 850,296" fill="none" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="600" y="275" text-anchor="middle" font-size="11" font-family="Menlo, monospace" fill="#5A6472">batch (B, T)</text>

  <!-- ============ LEFT column: GPT ============ -->
  <text x="350" y="316" text-anchor="middle" font-size="16" font-weight="bold" fill="#2E86AB">GPT (model_gpt.py)</text>
  <rect x="255" y="326" width="190" height="24" rx="12" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.2"/>
  <text x="350" y="343" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#2E86AB">activations: dense, +/-</text>

  <rect x="190" y="366" width="320" height="60" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="350" y="392" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">Token + position embedding</text>
  <text x="350" y="410" text-anchor="middle" font-size="10.5" font-family="Menlo, monospace" fill="#5A6472">(B, T, C)</text>
  <line x1="350" y1="426" x2="350" y2="444" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="190" y="446" width="320" height="60" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="350" y="472" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">Self-attention</text>
  <text x="350" y="490" text-anchor="middle" font-size="10.5" fill="#D1495B">T x T softmax, quadratic</text>
  <line x1="350" y1="506" x2="350" y2="524" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="190" y="526" width="320" height="60" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="350" y="552" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">MLP</text>
  <text x="350" y="570" text-anchor="middle" font-size="10.5" fill="#5A6472">DENSE signed activations</text>
  <line x1="350" y1="586" x2="350" y2="604" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="190" y="606" width="320" height="60" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="350" y="632" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">LM head</text>
  <text x="350" y="650" text-anchor="middle" font-size="10.5" font-family="Menlo, monospace" fill="#5A6472">-&gt; logits (B, T, V)</text>

  <!-- ============ RIGHT column: BDH ============ -->
  <text x="850" y="316" text-anchor="middle" font-size="16" font-weight="bold" fill="#9A6B00">BDH (model_bdh.py)</text>
  <rect x="748" y="326" width="204" height="24" rx="12" fill="#FBEFD6" stroke="#E9A12E" stroke-width="1.2"/>
  <text x="850" y="343" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#9A6B00">activations: sparse, positive</text>

  <rect x="690" y="360" width="320" height="52" rx="11" fill="#FBEFD6" stroke="#E9A12E" stroke-width="1.6"/>
  <text x="850" y="382" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">Embed, C is small</text>
  <text x="850" y="400" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#5A6472">(B, T, C)</text>
  <line x1="850" y1="412" x2="850" y2="428" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="690" y="430" width="320" height="52" rx="11" fill="#FBEFD6" stroke="#E9A12E" stroke-width="1.6"/>
  <text x="850" y="452" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">Project up to neuron dim N</text>
  <text x="850" y="470" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#5A6472">(B, T, N)</text>
  <line x1="850" y1="482" x2="850" y2="498" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="690" y="500" width="320" height="52" rx="11" fill="#FBEFD6" stroke="#E9A12E" stroke-width="1.6"/>
  <text x="850" y="522" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">ReLU -&gt; POSITIVE + SPARSE</text>
  <text x="850" y="540" text-anchor="middle" font-size="10.5" fill="#9A6B00">~few % active</text>
  <line x1="850" y1="552" x2="850" y2="568" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="690" y="570" width="320" height="52" rx="11" fill="#FBEFD6" stroke="#E9A12E" stroke-width="1.6"/>
  <text x="850" y="592" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">Linear attention</text>
  <text x="850" y="610" text-anchor="middle" font-size="10.5" fill="#9A6B00">running state, linear cost</text>
  <line x1="850" y1="622" x2="850" y2="638" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <rect x="690" y="640" width="320" height="52" rx="11" fill="#FBEFD6" stroke="#E9A12E" stroke-width="1.6"/>
  <text x="850" y="662" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">read-out</text>
  <text x="850" y="680" text-anchor="middle" font-size="10" font-family="Menlo, monospace" fill="#5A6472">-&gt; logits (B, T, V)</text>

  <!-- converge -->
  <path d="M350,666 C350,720 500,720 560,742" fill="none" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <path d="M850,692 C850,725 700,725 640,742" fill="none" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="440" y="712" text-anchor="middle" font-size="10.5" font-family="Menlo, monospace" fill="#5A6472">logits (B,T,V)</text>
  <text x="760" y="712" text-anchor="middle" font-size="10.5" font-family="Menlo, monospace" fill="#5A6472">logits (B,T,V)</text>

  <!-- scoreboard -->
  <rect x="300" y="752" width="600" height="140" rx="12" fill="#F5F7F9" stroke="#5A6472" stroke-width="1.8"/>
  <text x="600" y="780" text-anchor="middle" font-size="15" font-weight="bold" fill="#1A1D23">Same scoreboard</text>
  <rect x="325" y="796" width="260" height="36" rx="9" fill="#FFFFFF" stroke="#9AA3AD" stroke-width="1.2"/>
  <text x="455" y="819" text-anchor="middle" font-size="11.5" fill="#1A1D23">train/val loss (nats/char)</text>
  <rect x="615" y="796" width="260" height="36" rx="9" fill="#FFFFFF" stroke="#9AA3AD" stroke-width="1.2"/>
  <text x="745" y="819" text-anchor="middle" font-size="11.5" fill="#1A1D23">sample quality (sample.py)</text>
  <rect x="325" y="842" width="260" height="36" rx="9" fill="#FFFFFF" stroke="#9AA3AD" stroke-width="1.2"/>
  <text x="455" y="865" text-anchor="middle" font-size="11.5" fill="#1A1D23">activation sparsity %</text>
  <rect x="615" y="842" width="260" height="36" rx="9" fill="#FFFFFF" stroke="#9AA3AD" stroke-width="1.2"/>
  <text x="745" y="865" text-anchor="middle" font-size="11.5" fill="#1A1D23">cost + interpretability</text>
</svg>
