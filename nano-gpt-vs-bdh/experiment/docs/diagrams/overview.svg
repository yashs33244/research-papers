<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="430" viewBox="0 0 1240 430" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A6472"/>
    </marker>
  </defs>

  <text x="620" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#1A1D23">How a character-level language model works</text>
  <text x="620" y="56" text-anchor="middle" font-size="13" fill="#5A6472">one job: look at the text so far, predict the next character - then do it again</text>

  <!-- box helper style via inline attrs -->
  <!-- 1. Text -->
  <rect x="20" y="120" width="150" height="72" rx="10" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="95" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Text</text>
  <text x="95" y="170" text-anchor="middle" font-size="11" fill="#5A6472">TinyShakespeare</text>

  <!-- 2. Tokenize -->
  <rect x="195" y="120" width="150" height="72" rx="10" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="270" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Tokenize</text>
  <text x="270" y="170" text-anchor="middle" font-size="11" fill="#5A6472">chars → integers</text>

  <!-- 3. Embed -->
  <rect x="370" y="120" width="170" height="72" rx="10" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="455" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Embed</text>
  <text x="455" y="170" text-anchor="middle" font-size="11" fill="#5A6472">ints → vectors + position</text>

  <!-- 4. Model (split) -->
  <rect x="565" y="103" width="235" height="128" rx="12" fill="#FFFFFF" stroke="#5A6472" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="682" y="120" text-anchor="middle" font-size="12" font-weight="bold" fill="#5A6472">THE MODEL (mixes context)</text>
  <rect x="580" y="130" width="205" height="42" rx="8" fill="#E4F1F7" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="682" y="150" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">GPT: self-attention</text>
  <text x="682" y="165" text-anchor="middle" font-size="10.5" fill="#5A6472">token ↔ token</text>
  <rect x="580" y="180" width="205" height="42" rx="8" fill="#FBEFD6" stroke="#E9A12E" stroke-width="1.6"/>
  <text x="682" y="200" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">BDH: neuron field</text>
  <text x="682" y="215" text-anchor="middle" font-size="10.5" fill="#9A6B00">sparse, positive; attention emerges</text>

  <!-- 5. Probabilities -->
  <rect x="820" y="120" width="160" height="72" rx="10" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="900" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Probabilities</text>
  <text x="900" y="170" text-anchor="middle" font-size="11" fill="#5A6472">score for each next char</text>

  <!-- 6. Sample -->
  <rect x="1005" y="120" width="150" height="72" rx="10" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="1080" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Sample</text>
  <text x="1080" y="170" text-anchor="middle" font-size="11" fill="#5A6472">pick a character</text>

  <!-- forward arrows -->
  <line x1="170" y1="156" x2="193" y2="156" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="345" y1="156" x2="368" y2="156" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="540" y1="156" x2="563" y2="156" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="800" y1="156" x2="818" y2="156" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="980" y1="156" x2="1003" y2="156" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- generation feedback loop -->
  <path d="M1080,192 C1080,330 400,360 95,330 L95,196" fill="none" stroke="#2A9D8F" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="600" y="352" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2A9D8F">generation loop (inference): append the new character, then predict the next one</text>

  <!-- training note -->
  <rect x="565" y="250" width="235" height="60" rx="10" fill="#FBECEE" stroke="#D1495B" stroke-width="1.4"/>
  <text x="682" y="270" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#D1495B">training (learning the weights)</text>
  <text x="682" y="287" text-anchor="middle" font-size="10" fill="#5A6472">compare prediction to the real</text>
  <text x="682" y="300" text-anchor="middle" font-size="10" fill="#5A6472">next char → loss → backprop</text>
  <line x1="682" y1="231" x2="682" y2="248" stroke="#D1495B" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="620" y="408" text-anchor="middle" font-size="11" fill="#5A6472">Chapters 1-2 build the left half; 3-5 build the GPT model; 6-7 train and sample; 8-10 add and compare BDH.</text>
</svg>
