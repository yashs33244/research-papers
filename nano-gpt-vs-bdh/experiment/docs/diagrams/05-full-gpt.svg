<svg xmlns="http://www.w3.org/2000/svg" width="960" height="940" viewBox="0 0 960 940" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A6472"/>
    </marker>
  </defs>

  <text x="430" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A1D23">The Full GPT forward pass</text>
  <text x="430" y="65" text-anchor="middle" font-size="13" fill="#5A6472">shapes tracked in (B, T, C) notation from token ids all the way to next-char probabilities</text>

  <!-- 1 input ids -->
  <rect x="270" y="90" width="320" height="48" rx="11" fill="#F5F7F9" stroke="#5A6472" stroke-width="1.6"/>
  <text x="430" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Input token ids (idx)</text>
  <line x1="430" y1="138" x2="430" y2="168" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="470" y="158" text-anchor="start" font-size="11" font-family="Menlo, monospace" fill="#5A6472">(B, T)</text>

  <!-- 2 embeddings -->
  <rect x="270" y="170" width="320" height="56" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.8"/>
  <text x="430" y="195" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1A1D23">Token embedding wte</text>
  <text x="430" y="214" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1A1D23">+ Position embedding wpe</text>
  <line x1="430" y1="226" x2="430" y2="266" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="470" y="252" text-anchor="start" font-size="11" font-family="Menlo, monospace" fill="#5A6472">(B, T, C)</text>

  <!-- 3 block stack container -->
  <rect x="250" y="268" width="360" height="298" rx="14" fill="#FBEFD6" stroke="#E9A12E" stroke-width="2"/>
  <text x="430" y="292" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#9A6B00">Stack of N = n_layer identical blocks</text>
  <text x="430" y="309" text-anchor="middle" font-size="10.5" fill="#9A6B00">holds ~99% of the parameters</text>

  <!-- residual stream line -->
  <line x1="268" y1="318" x2="268" y2="556" stroke="#2A9D8F" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="238" y="440" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#2A9D8F" transform="rotate(-90 238 440)">residual stream</text>

  <!-- block boxes -->
  <rect x="300" y="316" width="290" height="56" rx="9" fill="#FFFFFF" stroke="#E9A12E" stroke-width="1.5"/>
  <text x="445" y="339" text-anchor="middle" font-size="11.5" font-family="Menlo, monospace" fill="#1A1D23">x = x + Attn(LN1(x))</text>
  <text x="445" y="358" text-anchor="middle" font-size="11.5" font-family="Menlo, monospace" fill="#1A1D23">x = x + MLP(LN2(x))</text>

  <rect x="300" y="380" width="290" height="56" rx="9" fill="#FFFFFF" stroke="#E9A12E" stroke-width="1.5"/>
  <text x="445" y="403" text-anchor="middle" font-size="11.5" font-family="Menlo, monospace" fill="#1A1D23">x = x + Attn(LN1(x))</text>
  <text x="445" y="422" text-anchor="middle" font-size="11.5" font-family="Menlo, monospace" fill="#1A1D23">x = x + MLP(LN2(x))</text>

  <text x="445" y="462" text-anchor="middle" font-size="20" font-weight="bold" fill="#9A6B00">.</text>
  <text x="445" y="454" text-anchor="middle" font-size="20" font-weight="bold" fill="#9A6B00">. . .</text>

  <rect x="300" y="474" width="290" height="56" rx="9" fill="#FFFFFF" stroke="#E9A12E" stroke-width="1.5"/>
  <text x="445" y="497" text-anchor="middle" font-size="11.5" font-family="Menlo, monospace" fill="#1A1D23">x = x + Attn(LN1(x))</text>
  <text x="445" y="516" text-anchor="middle" font-size="11.5" font-family="Menlo, monospace" fill="#1A1D23">x = x + MLP(LN2(x))</text>

  <line x1="430" y1="566" x2="430" y2="596" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="470" y="586" text-anchor="start" font-size="11" font-family="Menlo, monospace" fill="#5A6472">(B, T, C)</text>

  <!-- 4 final layernorm -->
  <rect x="270" y="598" width="320" height="46" rx="11" fill="#F5F7F9" stroke="#5A6472" stroke-width="1.6"/>
  <text x="430" y="627" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1A1D23">Final LayerNorm (ln_f)</text>
  <line x1="430" y1="644" x2="430" y2="674" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="470" y="664" text-anchor="start" font-size="11" font-family="Menlo, monospace" fill="#5A6472">(B, T, C)</text>

  <!-- 5 lm head -->
  <rect x="270" y="676" width="320" height="48" rx="11" fill="#F5F7F9" stroke="#5A6472" stroke-width="1.6"/>
  <text x="430" y="700" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1A1D23">Linear LM head</text>
  <text x="430" y="716" text-anchor="middle" font-size="10.5" fill="#5A6472">weight tied to wte</text>
  <line x1="430" y1="724" x2="430" y2="754" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="470" y="744" text-anchor="start" font-size="11" font-family="Menlo, monospace" fill="#5A6472">(B, T, V)</text>

  <!-- 6 logits -> probs -->
  <rect x="270" y="756" width="320" height="44" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="430" y="783" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1A1D23">Logits</text>
  <line x1="430" y1="800" x2="430" y2="828" stroke="#5A6472" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="470" y="820" text-anchor="start" font-size="11" fill="#5A6472">softmax</text>

  <rect x="250" y="830" width="360" height="48" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.8"/>
  <text x="430" y="860" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1A1D23">Next-char probabilities (sum to 1)</text>

  <!-- right callout bracket -->
  <path d="M660,95 C690,95 690,95 690,120 L690,470 C690,486 700,486 710,486 C700,486 690,486 690,502 L690,853 C690,878 690,878 660,878" fill="none" stroke="#5A6472" stroke-width="1.6"/>
  <text x="770" y="470" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1D23">same skeleton</text>
  <text x="770" y="488" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1D23">reused by BDH;</text>
  <text x="770" y="506" text-anchor="middle" font-size="11.5" fill="#5A6472">only block internals differ</text>

  <!-- bottom caption -->
  <rect x="60" y="898" width="840" height="30" rx="8" fill="#F5F7F9" stroke="#5A6472" stroke-width="1.1"/>
  <text x="480" y="918" text-anchor="middle" font-size="11.5" fill="#5A6472">B=batch, T=context length, C=embed dim, V=vocab (~65). Char-level config: N=6, C=384, T=256, V=65, ~10.8M params.</text>
</svg>
