<svg xmlns="http://www.w3.org/2000/svg" width="1420" height="640" viewBox="0 0 1420 640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A6472"/>
    </marker>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E9A12E"/>
    </marker>
  </defs>

  <text x="710" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A1D23">The training loop</text>
  <text x="710" y="65" text-anchor="middle" font-size="13" fill="#5A6472">one step: draw a batch, predict, measure the error, and nudge every weight to reduce it</text>

  <!-- feedback loop (bold, over the top) -->
  <path d="M1190,190 C1190,110 1190,110 1110,110 L595,110 C515,110 515,110 515,188" fill="none" stroke="#E9A12E" stroke-width="3" marker-end="url(#arrowA)"/>
  <text x="850" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#9A6B00">update weights, repeat</text>

  <!-- 1 train.pt cylinder -->
  <g>
    <path d="M40,215 a55,14 0 0 1 110,0 v66 a55,14 0 0 1 -110,0 z" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
    <ellipse cx="95" cy="215" rx="55" ry="14" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
    <text x="95" y="255" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1A1D23">train.pt</text>
    <text x="95" y="272" text-anchor="middle" font-size="10" fill="#5A6472">token tensor</text>
  </g>
  <line x1="150" y1="248" x2="208" y2="248" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- 2 get_batch -->
  <rect x="210" y="210" width="160" height="76" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="290" y="253" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">get_batch</text>
  <line x1="370" y1="248" x2="428" y2="248" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="399" y="238" text-anchor="middle" font-size="10.5" font-family="Menlo, monospace" fill="#5A6472">x, y : (B, T)</text>

  <!-- 3 Model -->
  <rect x="430" y="210" width="180" height="76" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.8"/>
  <text x="520" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Model</text>
  <text x="520" y="266" text-anchor="middle" font-size="11" fill="#5A6472">GPT or BDH</text>
  <line x1="610" y1="248" x2="656" y2="248" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="633" y="238" text-anchor="middle" font-size="9.5" font-family="Menlo, monospace" fill="#5A6472">logits (B,T,V)</text>

  <!-- 4 cross-entropy -->
  <rect x="658" y="210" width="190" height="76" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="753" y="245" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Cross-entropy loss</text>
  <text x="753" y="264" text-anchor="middle" font-size="10.5" fill="#5A6472">how wrong the guess was</text>
  <rect x="658" y="298" width="190" height="52" rx="9" fill="#FFFFFF" stroke="#5A6472" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="753" y="318" text-anchor="middle" font-size="10" fill="#5A6472">-log(prob of correct char),</text>
  <text x="753" y="334" text-anchor="middle" font-size="10" fill="#5A6472">averaged; step-0 ~ 4.17</text>
  <line x1="848" y1="248" x2="896" y2="248" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="872" y="238" text-anchor="middle" font-size="9.5" fill="#5A6472">loss</text>

  <!-- 5 backprop -->
  <rect x="898" y="210" width="160" height="76" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.6"/>
  <text x="978" y="253" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">Backprop</text>
  <line x1="1058" y1="248" x2="1108" y2="248" stroke="#5A6472" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="1083" y="238" text-anchor="middle" font-size="9" fill="#5A6472">gradients</text>

  <!-- 6 AdamW -->
  <rect x="1110" y="210" width="170" height="76" rx="11" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.8"/>
  <text x="1195" y="253" text-anchor="middle" font-size="14" font-weight="bold" fill="#1A1D23">AdamW step</text>
  <rect x="1110" y="298" width="170" height="52" rx="9" fill="#FFFFFF" stroke="#5A6472" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="1195" y="318" text-anchor="middle" font-size="10" fill="#5A6472">weights -= lr * update</text>
  <text x="1195" y="334" text-anchor="middle" font-size="10" fill="#5A6472">+ weight decay</text>

  <!-- eval offshoot -->
  <path d="M520,286 L520,420" fill="none" stroke="#9AA3AD" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="600" y="360" text-anchor="middle" font-size="10.5" fill="#9AA3AD">measurement side-path (no update)</text>

  <!-- eval cylinders -->
  <g>
    <path d="M250,438 a40,11 0 0 1 80,0 v40 a40,11 0 0 1 -80,0 z" fill="#ECEEF1" stroke="#9AA3AD" stroke-width="1.4"/>
    <ellipse cx="290" cy="438" rx="40" ry="11" fill="#ECEEF1" stroke="#9AA3AD" stroke-width="1.4"/>
    <text x="290" y="468" text-anchor="middle" font-size="11" fill="#5A6472">train.pt</text>
  </g>
  <g>
    <path d="M250,510 a40,11 0 0 1 80,0 v40 a40,11 0 0 1 -80,0 z" fill="#ECEEF1" stroke="#9AA3AD" stroke-width="1.4"/>
    <ellipse cx="290" cy="510" rx="40" ry="11" fill="#ECEEF1" stroke="#9AA3AD" stroke-width="1.4"/>
    <text x="290" y="540" text-anchor="middle" font-size="11" fill="#5A6472">val.pt</text>
  </g>
  <line x1="330" y1="460" x2="418" y2="480" stroke="#9AA3AD" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <line x1="330" y1="524" x2="418" y2="500" stroke="#9AA3AD" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- estimate_loss box -->
  <rect x="420" y="450" width="240" height="80" rx="11" fill="#F5F7F9" stroke="#9AA3AD" stroke-width="1.6"/>
  <text x="540" y="485" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#5A6472">estimate_loss</text>
  <text x="540" y="505" text-anchor="middle" font-size="10.5" fill="#5A6472">no_grad, eval mode</text>

  <line x1="660" y1="478" x2="728" y2="478" stroke="#9AA3AD" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="660" y1="502" x2="728" y2="502" stroke="#9AA3AD" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="730" y="458" width="150" height="40" rx="9" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.4"/>
  <text x="805" y="483" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1D23">train loss</text>
  <rect x="730" y="504" width="150" height="40" rx="9" fill="#FBEFD6" stroke="#E9A12E" stroke-width="1.4"/>
  <text x="805" y="529" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1D23">val loss</text>
  <text x="1010" y="503" text-anchor="middle" font-size="11" fill="#D1495B">gap growing = overfitting</text>
</svg>
