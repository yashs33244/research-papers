<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1180" viewBox="0 0 1200 1180" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A6472"/>
    </marker>
    <marker id="arrowGr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2A9D8F"/>
    </marker>
  </defs>

  <text x="600" y="42" text-anchor="middle" font-size="22" font-weight="bold" fill="#1A1D23">Three ahas of a trained BDH</text>
  <text x="600" y="65" text-anchor="middle" font-size="13" fill="#5A6472">what the positive, sparse neuron field turns out to look like once training finishes</text>

  <!-- left margin connector arrow -->
  <line x1="45" y1="120" x2="45" y2="1060" stroke="#2A9D8F" stroke-width="2.2" stroke-dasharray="7 5" marker-end="url(#arrowGr)"/>
  <text x="30" y="590" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2A9D8F" transform="rotate(-90 30 590)">sparsity + positivity enable the graph and the single-concept edges</text>

  <!-- ===================== PANEL A ===================== -->
  <rect x="90" y="95" width="1080" height="320" rx="12" fill="#FFFFFF" stroke="#5A6472" stroke-width="1.3"/>
  <text x="120" y="128" font-size="16" font-weight="bold" fill="#1A1D23">Aha 1: sparse positive activations</text>

  <!-- activation grid: 8 cols (T) x 10 rows (neurons) -->
  <g>
    <rect x="200" y="150" width="208" height="234" fill="#FBFCFD" stroke="#9AA3AD" stroke-width="1.2"/>
    <!-- vertical lines -->
    <line x1="226" y1="150" x2="226" y2="384" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="252" y1="150" x2="252" y2="384" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="278" y1="150" x2="278" y2="384" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="304" y1="150" x2="304" y2="384" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="330" y1="150" x2="330" y2="384" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="356" y1="150" x2="356" y2="384" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="382" y1="150" x2="382" y2="384" stroke="#E2E6EA" stroke-width="0.8"/>
    <!-- horizontal lines every ~23 -->
    <line x1="200" y1="173" x2="408" y2="173" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="200" y1="196" x2="408" y2="196" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="200" y1="219" x2="408" y2="219" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="200" y1="242" x2="408" y2="242" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="200" y1="266" x2="408" y2="266" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="200" y1="290" x2="408" y2="290" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="200" y1="314" x2="408" y2="314" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="200" y1="337" x2="408" y2="337" stroke="#E2E6EA" stroke-width="0.8"/>
    <line x1="200" y1="360" x2="408" y2="360" stroke="#E2E6EA" stroke-width="0.8"/>
    <!-- firing dots (~1 in 20) -->
    <circle cx="239" cy="207" r="6" fill="#2A9D8F"/>
    <circle cx="317" cy="161" r="6" fill="#2A9D8F"/>
    <circle cx="265" cy="278" r="6" fill="#2A9D8F"/>
    <circle cx="369" cy="325" r="6" fill="#2A9D8F"/>
    <circle cx="213" cy="371" r="6" fill="#2A9D8F"/>
    <circle cx="343" cy="231" r="6" fill="#2A9D8F"/>
  </g>
  <text x="304" y="404" text-anchor="middle" font-size="11" fill="#5A6472">T positions (columns): t   o   [space]   b   e ...</text>
  <text x="176" y="267" text-anchor="middle" font-size="11" fill="#5A6472" transform="rotate(-90 176 267)">sample of ~12 neurons</text>

  <!-- side note -->
  <rect x="470" y="200" width="290" height="80" rx="10" fill="#F5F7F9" stroke="#5A6472" stroke-width="1.2"/>
  <text x="615" y="230" text-anchor="middle" font-size="12.5" fill="#1A1D23">min activation = 0 (ReLU)</text>
  <text x="615" y="256" text-anchor="middle" font-size="12.5" fill="#1A1D23">active fraction ~ 5% per column</text>

  <!-- histogram icon -->
  <text x="960" y="175" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1D23">per-token active fraction</text>
  <g fill="#2A9D8F">
    <rect x="850" y="330" width="24" height="20"/>
    <rect x="878" y="270" width="24" height="80"/>
    <rect x="906" y="210" width="24" height="140"/>
    <rect x="934" y="250" width="24" height="100"/>
    <rect x="962" y="300" width="24" height="50"/>
    <rect x="990" y="330" width="24" height="20"/>
    <rect x="1018" y="340" width="24" height="10"/>
  </g>
  <line x1="845" y1="352" x2="1050" y2="352" stroke="#5A6472" stroke-width="1.2"/>
  <text x="918" y="372" text-anchor="middle" font-size="10.5" fill="#5A6472">mass near 0.05</text>

  <!-- ===================== PANEL B ===================== -->
  <rect x="90" y="440" width="1080" height="340" rx="12" fill="#FFFFFF" stroke="#5A6472" stroke-width="1.3"/>
  <text x="120" y="473" font-size="16" font-weight="bold" fill="#1A1D23">Aha 2: emergent scale-free, modular neuron graph</text>

  <!-- clusters dashed circles -->
  <circle cx="240" cy="560" r="70" fill="none" stroke="#2E86AB" stroke-width="1.3" stroke-dasharray="5 4"/>
  <circle cx="430" cy="620" r="72" fill="none" stroke="#E9A12E" stroke-width="1.3" stroke-dasharray="5 4"/>
  <circle cx="290" cy="720" r="70" fill="none" stroke="#2A9D8F" stroke-width="1.3" stroke-dasharray="5 4"/>

  <!-- edges -->
  <g stroke="#9AA3AD" stroke-width="1.2">
    <line x1="240" y1="560" x2="195" y2="530"/>
    <line x1="240" y1="560" x2="285" y2="540"/>
    <line x1="240" y1="560" x2="210" y2="600"/>
    <line x1="240" y1="560" x2="430" y2="620"/>
    <line x1="430" y1="620" x2="400" y2="575"/>
    <line x1="430" y1="620" x2="480" y2="590"/>
    <line x1="430" y1="620" x2="470" y2="655"/>
    <line x1="430" y1="620" x2="395" y2="665"/>
    <line x1="430" y1="620" x2="290" y2="720"/>
    <line x1="290" y1="720" x2="255" y2="700"/>
    <line x1="290" y1="720" x2="335" y2="710"/>
    <line x1="290" y1="720" x2="275" y2="762"/>
    <line x1="290" y1="720" x2="340" y2="755"/>
  </g>
  <!-- hub nodes (big) -->
  <circle cx="240" cy="560" r="14" fill="#2E86AB"/>
  <circle cx="430" cy="620" r="15" fill="#E9A12E"/>
  <!-- small nodes -->
  <g>
    <circle cx="195" cy="530" r="7" fill="#2E86AB"/>
    <circle cx="285" cy="540" r="7" fill="#2E86AB"/>
    <circle cx="210" cy="600" r="7" fill="#2E86AB"/>
    <circle cx="400" cy="575" r="7" fill="#E9A12E"/>
    <circle cx="480" cy="590" r="7" fill="#E9A12E"/>
    <circle cx="470" cy="655" r="7" fill="#E9A12E"/>
    <circle cx="395" cy="665" r="7" fill="#E9A12E"/>
    <circle cx="290" cy="720" r="9" fill="#2A9D8F"/>
    <circle cx="255" cy="700" r="7" fill="#2A9D8F"/>
    <circle cx="335" cy="710" r="7" fill="#2A9D8F"/>
    <circle cx="275" cy="762" r="7" fill="#2A9D8F"/>
    <circle cx="340" cy="755" r="7" fill="#2A9D8F"/>
  </g>
  <text x="290" y="768" text-anchor="middle" font-size="10.5" fill="#5A6472">two big hubs, most nodes have 1-3 links; three communities</text>

  <!-- weight matrix icon -->
  <g>
    <rect x="560" y="540" width="90" height="90" fill="#F5F7F9" stroke="#5A6472" stroke-width="1.2"/>
    <line x1="590" y1="540" x2="590" y2="630" stroke="#C7CDD3" stroke-width="0.8"/>
    <line x1="620" y1="540" x2="620" y2="630" stroke="#C7CDD3" stroke-width="0.8"/>
    <line x1="560" y1="570" x2="650" y2="570" stroke="#C7CDD3" stroke-width="0.8"/>
    <line x1="560" y1="600" x2="650" y2="600" stroke="#C7CDD3" stroke-width="0.8"/>
    <rect x="561" y="571" width="28" height="28" fill="#2E86AB" opacity="0.5"/>
    <rect x="621" y="541" width="28" height="28" fill="#2E86AB" opacity="0.5"/>
  </g>
  <text x="605" y="652" text-anchor="middle" font-size="11" fill="#1A1D23">N x N weights</text>
  <line x1="558" y1="585" x2="518" y2="615" stroke="#5A6472" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="540" y="530" text-anchor="middle" font-size="10.5" fill="#5A6472">read from weights</text>

  <!-- log-log plot -->
  <text x="960" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A1D23">degree distribution (log-log)</text>
  <line x1="830" y1="520" x2="830" y2="720" stroke="#5A6472" stroke-width="1.4"/>
  <line x1="830" y1="720" x2="1090" y2="720" stroke="#5A6472" stroke-width="1.4"/>
  <text x="960" y="748" text-anchor="middle" font-size="11" fill="#5A6472">degree k</text>
  <text x="806" y="620" text-anchor="middle" font-size="11" fill="#5A6472" transform="rotate(-90 806 620)">count of neurons</text>
  <line x1="845" y1="545" x2="1075" y2="705" stroke="#D1495B" stroke-width="1.8"/>
  <g fill="#1A1D23">
    <circle cx="855" cy="555" r="3.5"/>
    <circle cx="895" cy="580" r="3.5"/>
    <circle cx="935" cy="600" r="3.5"/>
    <circle cx="980" cy="632" r="3.5"/>
    <circle cx="1025" cy="668" r="3.5"/>
    <circle cx="1065" cy="700" r="3.5"/>
  </g>
  <text x="1010" y="560" text-anchor="middle" font-size="11" fill="#D1495B">power law (scale-free)</text>

  <!-- ===================== PANEL C ===================== -->
  <rect x="90" y="805" width="1080" height="330" rx="12" fill="#FFFFFF" stroke="#5A6472" stroke-width="1.3"/>
  <text x="120" y="838" font-size="16" font-weight="bold" fill="#1A1D23">Aha 3: monosemantic synapse</text>

  <!-- two neurons + bold edge -->
  <line x1="290" y1="905" x2="490" y2="905" stroke="#D1495B" stroke-width="4"/>
  <circle cx="290" cy="905" r="24" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.8"/>
  <text x="290" y="911" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1D23">i</text>
  <circle cx="490" cy="905" r="24" fill="#EAF2F8" stroke="#2E86AB" stroke-width="1.8"/>
  <text x="490" y="911" text-anchor="middle" font-size="16" font-weight="bold" fill="#1A1D23">j</text>
  <text x="390" y="882" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#D1495B">synapse (i, j)</text>

  <!-- faint contrast edge -->
  <line x1="290" y1="985" x2="490" y2="985" stroke="#C7CDD3" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="390" y="1008" text-anchor="middle" font-size="11" fill="#9AA3AD">random edge = polysemantic (fires everywhere)</text>

  <!-- text line with uppercase highlighted -->
  <text x="640" y="912" font-size="26" font-family="Menlo, monospace">
    <tspan fill="#D1495B" font-weight="bold">ROMEO</tspan><tspan fill="#9AA3AD">. </tspan><tspan fill="#D1495B" font-weight="bold">B</tspan><tspan fill="#9AA3AD">ut&#160;</tspan><tspan fill="#D1495B" font-weight="bold">S</tspan><tspan fill="#9AA3AD">oft</tspan>
  </text>
  <text x="760" y="960" text-anchor="middle" font-size="13" font-weight="bold" fill="#1A1D23">this edge fires only for: UPPERCASE</text>
  <text x="760" y="984" text-anchor="middle" font-size="11.5" fill="#5A6472">one edge = one human-readable concept</text>
</svg>
